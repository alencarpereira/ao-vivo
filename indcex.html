<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Painel Trader AO VIVO</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>⚽ Painel Profissional AO VIVO</h1>

    <div class="painel">

        <label>Placar Casa</label>
        <input type="number" id="golCasa">

        <label>Placar Visitante</label>
        <input type="number" id="golFora">

        <h2>Dados do jogo</h2>

        <label>Minuto</label>
        <input type="number" id="minuto">

        <label>Expectativa gols Casa (λ)</label>
        <input type="number" step="0.1" id="lambdaCasa">

        <label>Expectativa gols Visitante (λ)</label>
        <input type="number" step="0.1" id="lambdaFora">

        <label>Ataques perigosos Casa</label>
        <input type="number" id="ataqueCasa">

        <label>Ataques perigosos Visitante</label>
        <input type="number" id="ataqueFora">

        <label>Finalizações Casa</label>
        <input type="number" id="chuteCasa">

        <label>Finalizações Visitante</label>
        <input type="number" id="chuteFora">

        <label>Escanteios</label>
        <input type="number" id="escanteios">

        <button onclick="calcular()">Analisar Jogo</button>

    </div>

    <div class="resultado">

        <h2>📊 Probabilidade Resultado</h2>

        <p id="probCasa"></p>
        <p id="probEmpate"></p>
        <p id="probFora"></p>

        <h2 id="favorito"></h2>

        <div class="box">

            <h3>🔥 Índice de Pressão</h3>

            <p id="pressao"></p>

        </div>

        <div class="box">

            <h3>⚽ Probabilidade de Gol</h3>

            <p id="probGol"></p>

        </div>

        <div class="box">

            <h3>📈 Placares Prováveis</h3>

            <p id="placares"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
